name: M0 Reliability Baseline

on:
  push:
    branches:
      - main
      - phase/m0-reliability-baseline
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python sources
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Filter *.py